services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leasing_db
      POSTGRES_USER: leasing
      POSTGRES_PASSWORD: leasing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leasing -d leasing_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
